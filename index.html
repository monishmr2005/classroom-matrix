<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Matrix - Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Centered Overrides for a clean, single-card layout */
    .auth-body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-color: #08090e;
    }

    /* Keep absolute page positioning consistent */
    .auth-body-theme-wrapper {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-dark);
    }

    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 480px;
      max-width: 100%;
      background-color: var(--surface);
      border: 1px solid var(--border-line);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .matrix-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .matrix-header .logo-icon {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .matrix-header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .auth-form-side {
      width: 100%;
      padding: 0;
      background: none;
    }

    .auth-tabs {
      width: 100%;
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-body-theme-wrapper">
    
    <div class="auth-top-corner">
      <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()">☀️</button>
    </div>

    <div class="auth-container">
      <div class="matrix-header">
        <div class="logo-icon">🎓</div>
        <h1>Classroom Matrix</h1>
      </div>

      <div class="auth-form-side">
        <div class="form-box">
          <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
            <button class="tab-btn" id="tab-signup" onclick="switchAuthTab('signup')">Create Account</button>
          </div>

          <form id="login-form" class="auth-panel active" onsubmit="handleLogin(event)">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to access your designated institutional dashboard.</p>
            
            <div class="input-group">
              <label for="login-email">Academic Email</label>
              <input type="email" id="login-email" placeholder="name@college.edu" required>
            </div>

          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>

            <div id="login-error" class="error-text hidden"></div>
            <button type="submit" class="btn btn-primary btn-full">Access Portal →</button>
          </form>

          <form id="signup-form" class="auth-panel" onsubmit="handleSignup(event)">
            <h2>Register Profile</h2>
            <p class="auth-subtitle">Configure your decentralized student or faculty account credentials.</p>

            <div class="input-group">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" placeholder="Prof. Alex / Student Mercer" required>
            </div>
            
            <div class="input-group">
              <label for="signup-email">Email Address</label>
              <input type="email" id="signup-email" placeholder="name@college.edu" required>
            </div>

            <div class="input-group">
              <label for="signup-role">Workspace Role</label>
              <select id="signup-role" required>
                <option value="Student" selected>👨‍🎓 Student Profile</option>
                <option value="Teacher">👨‍🏫 Teacher / Instructor Profile</option>
              </select>
            </div>

            <div class="input-group">
              <label for="signup-password">Security Password</label>
              <input type="password" id="signup-password" placeholder="Minimum 6 characters" minlength="6" required>
            </div>

            <div id="signup-error" class="error-text hidden"></div>
            <button type="submit" class="btn btn-primary btn-full">Complete Registration ✓</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
